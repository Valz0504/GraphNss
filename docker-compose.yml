services:
  backend:
    build:
      context: .
      target: backend
      dockerfile: Dockerfile
    container_name: graphnss-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
      dockerfile: Dockerfile
    container_name: graphnss-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
